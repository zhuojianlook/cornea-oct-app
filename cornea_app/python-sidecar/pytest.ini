[pytest]
# Collect ONLY the unit-test suite under tests/. The repo's research benchmarks
# (atlas_test.py, burden_test.py, depthnorm_repro_test.py, …) are slow scripts
# that read real data — they are intentionally NOT collected here.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --import-mode=importlib
filterwarnings =
    ignore::DeprecationWarning
