name: build-cornea

# Builds the Cornea OCT desktop shell (Route A: native Tauri window that spawns the user's Python
# sidecar). Download installers from the run's Artifacts; a `cornea-v*` tag also cuts a Release.
# The shell does NOT bundle Python/torch — users still need the sidecar's Python deps installed.
on:
  workflow_dispatch:
  push:
    branches: ["feat/cornea-tauri"]
    tags: ["cornea-v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # LINUX-ONLY for fast turnaround during active Linux testing (2026-06-27, user request) — avoids
          # Windows/macOS build time + the flaky crates.io fetch on Windows that blocked publish. Re-add
          # macOS-arm64 / windows here when shipping a cross-platform release again.
          - platform: ubuntu-22.04
            args: ""
            label: linux
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install JS deps
        working-directory: cornea_app
        run: npm install

      - name: Build app + (on tag) publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          # Use a user PAT (RELEASE_PAT secret), NOT the default GITHUB_TOKEN: the GitHub-App-issued
          # GITHUB_TOKEN 403s on create-a-release here ("Resource not accessible by integration") even
          # with contents:write — a user token isn't "an integration", so it publishes cleanly.
          # RELEASE_PAT = a fine-grained PAT scoped to this repo with Contents: read+write.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          # Distinct signing key from the annotator so the two apps' updaters stay independent.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.CORNEA_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.CORNEA_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: cornea_app
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Cornea OCT {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: true

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cornea-${{ matrix.label }}
          if-no-files-found: warn
          path: |
            cornea_app/src-tauri/target/**/release/bundle/**/*.dmg
            cornea_app/src-tauri/target/**/release/bundle/**/*.app.tar.gz
            cornea_app/src-tauri/target/**/release/bundle/**/*.AppImage
            cornea_app/src-tauri/target/**/release/bundle/**/*.deb
            cornea_app/src-tauri/target/**/release/bundle/**/*.rpm
            cornea_app/src-tauri/target/**/release/bundle/**/*.msi
            cornea_app/src-tauri/target/**/release/bundle/**/*.exe
            cornea_app/src-tauri/target/**/release/bundle/**/*.sig

  # After all platform builds upload their installers + the signed latest.json to the cornea-vX.Y.Z
  # release, mirror that manifest onto a STABLE prerelease (cornea-updater) under the fixed filename
  # the app's updater endpoint points at. Without this the in-app updater has nothing to read.
  # (Kept as a prerelease so it never becomes the repo's "Latest" — that slot belongs to the annotator,
  # whose updater uses releases/latest in this same repo.)
  publish-manifest:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mirror updater manifest to the cornea-updater release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}   # same PAT — GITHUB_TOKEN 403s on release writes here
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # A copy-pasted RELEASE_PAT secret can carry a trailing newline, which makes gh send an
          # invalid Authorization header ("invalid header field value"); strip whitespace before use.
          # (tauri-action's octokit tolerates it, so the build/publish step is unaffected.)
          export GH_TOKEN="$(printf '%s' "$GH_TOKEN" | tr -d '[:space:]')"
          # tauri-action assembled the per-platform signed manifest as latest.json on the tag release.
          gh release download "$TAG" --repo "$REPO" --pattern "latest.json" --dir . --clobber
          mv latest.json cornea-latest.json
          # Create the stable manifest release on first run (prerelease); reuse it thereafter.
          if ! gh release view cornea-updater --repo "$REPO" >/dev/null 2>&1; then
            gh release create cornea-updater --repo "$REPO" --prerelease \
              --title "Cornea OCT — updater manifest" \
              --notes "Auto-updated pointer to the latest Cornea OCT release. Do not delete: the in-app updater reads cornea-latest.json from here."
          fi
          gh release upload cornea-updater cornea-latest.json --repo "$REPO" --clobber
          echo "Mirrored $TAG latest.json -> cornea-updater/cornea-latest.json"
